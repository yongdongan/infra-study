# 워크플로 이름: GitHub Actions 탭에서 표시될 이름
name: Terraform Apply

# on: 이 워크플로를 실행할 조건(트리거) 정의
on:
    push:
        branches: [main] # main 브랜치에 push 될 때만 실행

# permissions: 이 워크플로에 부여할 GitHub 토큰 권한
permissions:
    id-token: write #OIDC 토큰 발급 허용. (AWS 인증에 필요)
    contents: read # 레포 코드를 읽을 수 있는  권한

jobs:
    apply:
        runs-on: ubuntu-latest # GitHub이 제공하는 Ubuntu 가상머신에서 실행

        steps:
            # 레포 코드를 가상머신에 체크아웃 (반드시 첫 번째 Step)
            - uses: actions/checkout@v4

            # AWS 자격증명 설정: OIDC 토큰으로 임시 자격증명 발급
            # role-to-assume: 발급받을 IAM Role ARN (GitHub Secrets에서 읽음)
            # aws-region: 기본 리전 설정
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE.ARN }}
                aws-region: ap-northeast-2

            # Terraform CLI 설치
            # terraform_version: 고정 버전 지정 -> 환경마다 동일한 버전 보장
            - uses: hashicorp/setup-terraform@v3
              with:
                terraform_version: "1.7.0"
            
            # terraform init: S3 backend 연결 + 프로바이더 다운로드
            - name: Terraform Init
              run: |
                cd envs/dev #dev 환경 폴더로 이동
                terraform init

            # terraform validate: 문법 오류 검사 (AWS 접속 없이 실행)
            # 오류가 있으면 이 단계에서 멈추고 이후 Steps 실행 안 함
            - name: Terraform Validate
              run: |
                cd envs/dev
                terraform validate

            # terraform plan: 변경 예정 내용 출력 (실제 변경 없음)
            - name: Terraform Plan
              run: |
                cd envs/dev
                terraform plan

            # terraform apply -auto-approve: 실제 AWS 리소스 생성/변경
            # -auto-approve: 대화형 yes 입력 없이 자동 진행
            # (CI 환경에서는 대화형 입력이 불가능하므로 필수)
            - name: Terraform Apply
              run: |
                cd envs/dev
                terraform apply -auto-approve